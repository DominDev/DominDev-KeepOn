name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v1.6.1"
        required: true
        default: "v1.6.1"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: windows-latest

    env:
      DOTNET_VERSION: "10.0.x"
      CONFIGURATION: "Release"
      PROJECT_FILE: "KeepOn.csproj"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          dotnet-quality: ga

      - name: Restore
        shell: pwsh
        run: dotnet restore .\KeepOn.slnx

      - name: Build
        shell: pwsh
        run: dotnet build .\KeepOn.slnx -c $env:CONFIGURATION --no-restore

      - name: Publish variants
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $publishRoot = Join-Path $env:GITHUB_WORKSPACE 'artifacts\publish'
          $releaseRoot = Join-Path $env:GITHUB_WORKSPACE 'artifacts\release'

          Remove-Item -LiteralPath $publishRoot -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -LiteralPath $releaseRoot -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $publishRoot, $releaseRoot | Out-Null

          $variants = @(
            @{
              Name = 'portable-self-contained'
              Output = Join-Path $publishRoot 'portable-self-contained'
              Args = @('--self-contained', 'true', '/p:PublishSingleFile=true')
              Zip = Join-Path $releaseRoot 'KeepOn-portable-self-contained-win-x64.zip'
            },
            @{
              Name = 'portable-compressed'
              Output = Join-Path $publishRoot 'portable-compressed'
              Args = @('--self-contained', 'true', '/p:PublishSingleFile=true', '/p:EnableCompressionInSingleFile=true')
              Zip = Join-Path $releaseRoot 'KeepOn-portable-compressed-win-x64.zip'
            },
            @{
              Name = 'framework-dependent'
              Output = Join-Path $publishRoot 'framework-dependent'
              Args = @('--self-contained', 'false', '/p:PublishSingleFile=true')
              Zip = Join-Path $releaseRoot 'KeepOn-framework-dependent-win-x64.zip'
            }
          )

          foreach ($variant in $variants) {
            dotnet publish ".\$env:PROJECT_FILE" `
              -c $env:CONFIGURATION `
              -r win-x64 `
              -o $variant.Output `
              @($variant.Args)

            Compress-Archive -Path (Join-Path $variant.Output '*') -DestinationPath $variant.Zip -Force
          }

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: KeepOn-release-zips
          path: artifacts/release/*.zip
          if-no-files-found: error

      - name: Create or update GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'

          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $tag = '${{ inputs.tag }}'
          } else {
            $tag = '${{ github.ref_name }}'
          }

          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw 'Release tag is empty.'
          }

          $assets = Get-ChildItem -LiteralPath (Join-Path $env:GITHUB_WORKSPACE 'artifacts\release') -Filter '*.zip' |
            ForEach-Object { $_.FullName }

          if ($assets.Count -eq 0) {
            throw 'No release assets were generated.'
          }

          gh release view $tag --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag @assets --repo $env:GITHUB_REPOSITORY --clobber
          } else {
            gh release create $tag @assets `
              --repo $env:GITHUB_REPOSITORY `
              --target $env:GITHUB_SHA `
              --title "KeepOn $tag" `
              --notes-file (Join-Path $env:GITHUB_WORKSPACE 'CHANGELOG.md')
          }
